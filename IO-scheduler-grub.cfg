What are I/O schedulers, and when would you change them?
I/O schedulers (like CFQ, Deadline, or Noop) determine the order in which disk I/O requests are processed. For example, the Deadline scheduler is often preferred for database workloads to minimize latency, while Noop (or None) is typically best for SSDs or virtualized environments where the hypervisor handles scheduling.
An I/O Scheduler is a kernel component that manages how read and write requests from applications are queued and sent to the storage device (HDD/SSD).
Common I/O Schedulers
Deadline
Goal: Minimize "starvation" of requests.
How it works: It imposes a deadline on every request. If a request gets too old, it moves to the front of the line.
Best for: Databases and heavy multi-tasking where low latency is critical.
CFQ (Completely Fair Queuing)
Goal: Give every process an equal slice of disk bandwidth.
How it works: It creates a queue for every process and rotates through them.
Best for: General-purpose desktop use.
NOOP (No-Operation) / None
Goal: Do as little as possible.
How it works: It just inserts requests into a simple FIFO (First-In-First-Out) queue. It assumes the storage hardware is smart enough to handle its own optimization.
Best for: SSDs, NVMe drives, and Virtual Machines (where the host handles the scheduling).
Kyber (Modern)
Goal: Specifically designed for fast multi-queue devices like high-end SSDs.
How it works: It limits the number of requests to ensure the "dispatch" queue doesn't get overwhelmed, keeping latencies low.

1. Check Current and Available Schedulers 
Before making changes, verify which schedulers are supported by your kernel and which one is currently active for a specific device (e.g., sda).
cat /sys/block/sda/queue/scheduler

The active scheduler is the one enclosed in [brackets].
Output example: [mq-deadline] kyber bfq none 

2. Change the Scheduler at Runtime 
You can switch the scheduler by writing the desired name directly to the scheduler file for that specific disk.

# Example: Change sda to use the 'none' scheduler
echo none > /sys/block/sda/queue/scheduler

Using sudo with tee (if not logged in as root):
Directly using sudo echo ... > ... often fails due to shell redirection rules. Instead, use the nixCraft-recommended tee method:

echo "none" | sudo tee /sys/block/sda/queue/scheduler

3. Verify the Change
Run the cat command again to ensure the brackets have moved to your new choice

cat /sys/block/sda/queue/scheduler
# Expected output: mq-deadline kyber bfq [none]

Summary of Common Values
none: Best for NVMe or SSDs where you want minimal overhead.
mq-deadline: Good for databases to prioritize read requests and minimize latency.
bfq: Recommended for desktop responsiveness under heavy I/O

To make I/O scheduler changes permanent, the most robust method is using udev rules. This allows you to apply different schedulers based on the drive type (e.g., SSD vs. HDD) automatically whenever the system boots or a device is plugged in.

1. Create a udev Rule File 
Create a new file in the /etc/udev/rules.d/ directory. You can name it something descriptive like 60-scheduler.rules

2. Add Rules Based on Drive Type 
Inside the file, add rules to target specific devices. A common best practice is to use the rotational attribute to distinguish between HDDs (1) and SSDs (0)

For NVMe SSDs: Use none (minimal overhead).
For SATA SSDs: Use mq-deadline or none.
For HDDs: Use bfq or mq-deadline.

Example Content for 60-scheduler.rules:

# Set 'none' for NVMe devices
ACTION=="add|change", KERNEL=="nvme[0-9]*", ATTR{queue/scheduler}="none"

# Set 'none' for SATA SSDs (non-rotational)
ACTION=="add|change", KERNEL=="sd[a-z]*", ATTR{queue/rotational}=="0", ATTR{queue/scheduler}="none"

# Set 'mq-deadline' for HDDs (rotational)
ACTION=="add|change", KERNEL=="sd[a-z]*", ATTR{queue/rotational}=="1", ATTR{queue/scheduler}="mq-deadline"

3. Apply the New Rules
Once you save the file, tell the system to reload and trigger the rules immediately so you don't have to reboot to see the change

sudo udevadm control --reload-rules
sudo udevadm trigger

Alternative: Using GRUB (System-wide) 
If you want every single drive on the system to use the same scheduler, you can add a kernel parameter to your bootloader.

Edit /etc/default/grub and add elevator=mq-deadline (or your choice) to the GRUB_CMDLINE_LINUX_DEFAULT line.
Update GRUB: sudo update-grub (Ubuntu/Debian) or sudo grub2-mkconfig -o /boot/grub2/grub.cfg (RHEL/CentOS).

Note: For modern kernels (5.0+), the elevator parameter may be less effective than udev because of the shift to "Multi-Queue" (blk-mq) architecture.

To prioritize booting an older kernel automatically every time the server reboots, you must modify your GRUB configuration to change the default boot entry. 
Method 1: Using the saved Option (Easiest)
This method configures GRUB to remember the last kernel you manually selected. Once you boot into the older kernel once, it will remain the default until you choose a different one. 
Edit the GRUB configuration file:
sudo nano /etc/default/grub

Modify these specific lines:
1.Change GRUB_DEFAULT=0 to GRUB_DEFAULT=saved.
2.Add a new line: GRUB_SAVEDEFAULT=true.
3.Update GRUB to apply the changes:
1.Ubuntu/Debian: sudo update-grub.
2.RHEL/CentOS/Fedora: sudo grub2-mkconfig -o /boot/grub2/grub.cfg (or /boot/efi/EFI/redhat/grub.cfg for UEFI systems).
4.Reboot and manually select the older kernel from the "Advanced options" menu. It will now be the default for all future reboots


Method 2: Using grubby (RHEL, CentOS, Fedora)
If you are on a Red Hat-based system, the grubby tool is the most direct way to change the default kernel persistently without manually editing text files

List all installed kernels to find the path or index of your older kernel

sudo grubby --info=ALL
Set the default kernel using its path:
sudo grubby --set-default=/boot/vmlinuz-<VERSION>
Example: sudo grubby --set-default=/boot/vmlinuz-4.18.0-372.9.1.el8.x86_64).
Verify the change:
sudo grubby --default-kernel

